<!DOCTYPE html>
<html>

<head>
    <title>EmailJS Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body style="font-family: monospace; padding: 40px; background: #000; color: #0f0;">
    <h1>🚀 EmailJS Integration Test</h1>
    <button onclick="sendTestEmail()"
        style="padding: 20px 40px; font-size: 20px; cursor: pointer; background: #FFD700; border: none; font-weight: bold;">
        SEND TEST EMAIL
    </button>
    <pre id="output" style="margin-top: 20px; padding: 20px; background: #111; border: 1px solid #0f0;"></pre>

    <script>
        function sendTestEmail() {
            const output = document.getElementById('output');
            output.textContent = '🚀 Sending test email to sandesh@soulsync.tech...\n\n';

            const testData = {
                fullName: "Test User",
                email: "test@example.com",
                dob: "1990-01-01",
                tob: "12:00",
                pob: "Bangalore, India",
                questions: "This is a test submission to verify EmailJS integration is working correctly.",
                paymentStatus: "Mock Payment Success",
                transactionId: `TXN${Date.now()}`,
                submissionTime: new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })
            };

            output.textContent += 'Test Data:\n' + JSON.stringify(testData, null, 2) + '\n\n';

            emailjs.send(
                'service_kejjsw8',
                'template_dq668f3',
                testData,
                'p0Y1TsA4CgkB89zWO'
            )
                .then((response) => {
                    output.textContent += '✅ SUCCESS! Email sent successfully!\n';
                    output.textContent += 'Response Status: ' + response.status + '\n';
                    output.textContent += 'Response Text: ' + response.text + '\n\n';
                    output.textContent += '✅ Check sandesh@soulsync.tech for the test email!';
                    output.style.borderColor = '#0f0';
                })
                .catch((error) => {
                    output.textContent += '❌ FAILED! Error sending email:\n';
                    output.textContent += JSON.stringify(error, null, 2);
                    output.style.borderColor = '#f00';
                    console.error(error);
                });
        }
    </script>
</body>

</html>
